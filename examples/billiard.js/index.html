<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0">
<title>Billiard Game</title>
<meta name="description" content="Billiard Game (American and French) in pure HTML and JavaScript" />
<meta property="og:image" content="https://foo123.github.io/thumbs/billiard.jpg">
<meta property="og:url" content="https://foo123.github.io/examples/billiard.js/">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" href="./favicon-96x96.png?v=1.0.0" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="./favicon.svg?v=1.0.0" />
<link rel="shortcut icon" href="./favicon.ico?v=1.0.0" />
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=1.0.0" />
<meta name="apple-mobile-web-app-title" content="Billiard" />
<link rel="manifest" href="./manifest.json?v=1.0.0" />
<link rel="stylesheet" type="text/css" href="../common/css/common.min.css" />
<style type="text/css">
body {
    position: relative;
    font-family: Monospace, sans-serif;
    background: #121212;
    color: #efefef;
    font-size: 16px;
    margin: 0;
    padding: 0;
    min-height: 100%;
}
.button {
    -moz-box-shadow:inset 0px 1px 0px 0px #ffffff;
    -webkit-box-shadow:inset 0px 1px 0px 0px #ffffff;
    box-shadow:inset 0px 1px 0px 0px #ffffff;
    background:-webkit-gradient( linear, left top, left bottom, color-stop(0.05, #ededed), color-stop(1, #dfdfdf) );
    background:-moz-linear-gradient( center top, #ededed 5%, #dfdfdf 100% );
    filter:progid:DXImageTransform.Microsoft.gradient(startColorstr='#ededed', endColorstr='#dfdfdf');
    background-color:#ededed;
    -webkit-border-top-left-radius:20px;
    -moz-border-radius-topleft:20px;
    border-top-left-radius:20px;
    -webkit-border-top-right-radius:20px;
    -moz-border-radius-topright:20px;
    border-top-right-radius:20px;
    -webkit-border-bottom-right-radius:20px;
    -moz-border-radius-bottomright:20px;
    border-bottom-right-radius:20px;
    -webkit-border-bottom-left-radius:20px;
    -moz-border-radius-bottomleft:20px;
    border-bottom-left-radius:20px;
    text-indent:0;
    border:1px solid #dcdcdc;
    display:inline-block;
    color:#777777;
    font-family:Arial;
    font-size:16px;
    font-weight:bold;
    font-style:normal;
    height:30px;
    line-height:30px;
    width:86px;
    text-decoration:none;
    text-align:center;
    text-shadow:1px 1px 0px #ffffff;
}
.button:hover {
    background:-webkit-gradient( linear, left top, left bottom, color-stop(0.05, #dfdfdf), color-stop(1, #ededed) );
    background:-moz-linear-gradient( center top, #dfdfdf 5%, #ededed 100% );
    filter:progid:DXImageTransform.Microsoft.gradient(startColorstr='#dfdfdf', endColorstr='#ededed');
    background-color:#dfdfdf;
}.button:active {
    position:relative;
    top:1px;
}
.button {
    position: relative;
    width: 160px;
    height: 42px;
    line-height: 42px;
    cursor: pointer;
    display: block;
    margin: 3px 0px;
}
#wrapper {
    position: relative;
    display: block;
    box-sizing: border-box;
    width: 1024px;
    max-width: 100%;
    padding: 0;
    margin: 140px auto 40px auto;
}
#controls {
    position: relative;
    display: inline-block;
    box-sizing: border-box;
    vertical-align: top;
    width: 120px;
    border: 0;
    padding: 0;
    margin: 0 80px 20px 0;
}
#responsive-canvas {
    position: relative;
    display: inline-block;
    box-sizing: border-box;
    vertical-align: top;
    max-width: 100%;
    min-width: 340px;
    border: 0;
    padding: 0;
    margin: 0px 4px;
}
#canvas {
    position: relative;
    display: block;
    box-sizing: border-box;
    border: 0;
    padding: 0;
    margin: 0;
    width: 700px;
    height: 500px;
    transform-origin: 0 0;
    transform: scale(1);
}
#forkongithub a, #forkongithub a:hover{background:#155817;color:#fff;}
</style>
</head>
<body class="responsive-864-container">
<span id="forkongithub"><a href="https://github.com/foo123/Billiard.js">Play with me on GitHub</a></span>

<center style="margin-top:10px;"><img src='./assets/logo.png' style="max-width:300px;"/></center>

<div id="wrapper">
<div id="controls">

<select id="type" style="color:#121212;background:#efefef;padding:8px 6px;margin-bottom:8px;border-radius:10px">
<option value="1" selected>American Pool</option>
<option value="2">French Billiard</option>
</select>

<button id="newgame" class="button">New Game</button>

<ol id="instructions" style="position:relative;width:100%;margin-top:14px;font-size:14px">
<li>Rotate Stick with mouse to direct hit.</li>
<li>Press 'Q' key to lock stick and move mouse to give strike force.</li>
<li>Release 'Q' key to strike ball.</li>
</ol>
</div>

<div id="responsive-canvas"><canvas id="canvas" width=700 height=500></canvas></div>
</div>

<div class="fluid col-1-1 text-right" style="margin-top: 10px; padding-right:14px;"><a href="https://www.paypal.com/cgi-bin/webscr?cmd=_s-xclick&hosted_button_id=DP8WED9XW9TAE" class="donate">donate</a></div>

<script src="./NEngine.min.js"></script>
<script src="./billiard.min.js"></script>
<script type="text/javascript">
//<![CDATA[
(function(window) {
"use strict";
var billiard, canvas = document.getElementById('canvas'), types = document.getElementById('type');

function responsive_canvas(canvas)
{
    canvas.style.transform = 'scale('+String(Math.min(1, canvas.parentNode.offsetWidth/canvas.width))+')';
    return canvas;
}

billiard = new BILLIARD.Main(
    responsive_canvas(canvas), 1,
    './assets/billiardtable1.png',
    './assets/billiardtable2.png',
    './assets/white.png',
    './assets/black.png',
    './assets/yellow.png',
    './assets/red.png',
    './assets/taco.png'
);

document.getElementById('newgame').addEventListener('click', function() {
    billiard.init(parseInt(types.options[types.selectedIndex].value));
}, false);
window.addEventListener('resize', function() {
    responsive_canvas(canvas);
});
})(window);
//]]>
</script>
</body>
</html>
